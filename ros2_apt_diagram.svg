<svg xmlns="http://www.w3.org/2000/svg" width="680" height="620" viewBox="0 0 680 620" role="img" style="background:#ffffff; font-family: system-ui, -apple-system, sans-serif;">
  <title>Diagrama del comando de instalación de ROS2</title>
  <desc>Flujo del comando que construye una línea de APT source para ROS2 usando echo, pipe y tee</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3B6D11" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Section label 1 -->
  <text x="340" y="30" text-anchor="middle" font-size="13" fill="#888780" font-weight="500">① subcomandos evaluados primero</text>

  <!-- dpkg box: x=30 w=190 -->
  <rect x="30" y="44" width="190" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="125" y="67" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">dpkg --print-architecture</text>
  <text x="125" y="86" text-anchor="middle" font-size="11" fill="#0F6E56">detecta arch del sistema</text>
  <text x="125" y="114" text-anchor="middle" font-size="11" fill="#444441">ej: amd64</text>

  <!-- os-release box: x=245 w=200 -->
  <rect x="245" y="44" width="200" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="345" y="67" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">. /etc/os-release</text>
  <text x="345" y="86" text-anchor="middle" font-size="11" fill="#0F6E56">$UBUNTU_CODENAME</text>
  <text x="345" y="114" text-anchor="middle" font-size="11" fill="#444441">ej: jammy</text>

  <!-- GPG box: x=465 w=185 -->
  <rect x="465" y="44" width="185" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="557" y="67" text-anchor="middle" font-size="13" font-weight="500" fill="#444441">ruta de clave GPG</text>
  <text x="557" y="86" text-anchor="middle" font-size="11" fill="#5F5E5A">/usr/share/keyrings/…</text>
  <text x="557" y="114" text-anchor="middle" font-size="11" fill="#444441">fija (hardcoded)</text>

  <!-- Arrows down to echo -->
  <line x1="125" y1="118" x2="125" y2="152" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="345" y1="118" x2="345" y2="152" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="557" y1="118" x2="557" y2="152" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Section label 2 -->
  <text x="340" y="150" text-anchor="middle" font-size="13" fill="#185FA5" font-weight="500">② echo construye la línea completa</text>

  <!-- echo box: full width -->
  <rect x="30" y="160" width="620" height="58" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="340" y="182" text-anchor="middle" font-size="12" font-weight="500" fill="#0C447C">echo "deb [arch=amd64 signed-by=/usr/share/keyrings/ros-archive-keyring.gpg]</text>
  <text x="340" y="202" text-anchor="middle" font-size="12" fill="#185FA5">http://packages.ros.org/ros2/ubuntu jammy main"</text>

  <text x="340" y="234" text-anchor="middle" font-size="11" fill="#888780">stdout: la línea de repositorio lista para APT</text>

  <!-- Pipe arrow + label -->
  <line x1="340" y1="238" x2="340" y2="266" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="354" y="244" width="38" height="16" rx="4" fill="#E6F1FB"/>
  <text x="373" y="256" text-anchor="middle" font-size="11" fill="#185FA5">pipe |</text>

  <!-- Section label 3 -->
  <text x="340" y="283" text-anchor="middle" font-size="13" fill="#993C1D" font-weight="500">③ sudo tee escribe el resultado</text>

  <!-- tee box -->
  <rect x="100" y="292" width="480" height="58" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
  <text x="340" y="315" text-anchor="middle" font-size="13" font-weight="500" fill="#712B13">sudo tee /etc/apt/sources.list.d/ros2.list</text>
  <text x="340" y="335" text-anchor="middle" font-size="11" fill="#993C1D">necesita sudo — el directorio pertenece a root</text>

  <!-- Two arrows from tee -->
  <line x1="220" y1="350" x2="155" y2="396" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="460" y1="350" x2="525" y2="396" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- File result box -->
  <rect x="30" y="396" width="250" height="58" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="155" y="419" text-anchor="middle" font-size="13" font-weight="500" fill="#27500A">/etc/apt/sources.list.d/</text>
  <text x="155" y="438" text-anchor="middle" font-size="12" fill="#3B6D11">ros2.list creado correctamente</text>

  <!-- /dev/null box -->
  <rect x="400" y="396" width="250" height="58" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
  <text x="525" y="419" text-anchor="middle" font-size="13" font-weight="500" fill="#444441">stdout de tee</text>
  <text x="525" y="438" text-anchor="middle" font-size="11" fill="#5F5E5A">redirigido a /dev/null</text>

  <!-- /dev/null arrow and box -->
  <line x1="525" y1="454" x2="525" y2="486" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <rect x="400" y="486" width="250" height="40" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.5"/>
  <text x="525" y="511" text-anchor="middle" font-size="12" font-weight="500" fill="#444441">/dev/null — descartado</text>

  <!-- Final result -->
  <line x1="155" y1="454" x2="155" y2="486" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <rect x="30" y="486" width="250" height="40" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
  <text x="155" y="511" text-anchor="middle" font-size="12" font-weight="500" fill="#27500A">APT conoce el repo ROS2</text>

  <!-- Legend -->
  <rect x="30" y="546" width="12" height="12" rx="3" fill="#5DCAA5"/>
  <text x="48" y="557" font-size="11" fill="#5F5E5A">subcomando dinámico</text>
  <rect x="175" y="546" width="12" height="12" rx="3" fill="#378ADD"/>
  <text x="193" y="557" font-size="11" fill="#5F5E5A">echo (construye string)</text>
  <rect x="330" y="546" width="12" height="12" rx="3" fill="#D85A30"/>
  <text x="348" y="557" font-size="11" fill="#5F5E5A">tee (escribe con sudo)</text>
  <rect x="490" y="546" width="12" height="12" rx="3" fill="#639922"/>
  <text x="508" y="557" font-size="11" fill="#5F5E5A">resultado final</text>
</svg>
